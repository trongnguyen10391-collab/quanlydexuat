<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Đề Xuất - Supabase Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">
    
    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handleCapture(event)">
    <input type="hidden" id="active-proposal-id">

    <script>
        // Link Google Apps Script của bạn
        const GAS_URL = "https://script.google.com/macros/s/AKfycby2KfGaFE3ENOZH8ZkbEg0u1pJgWgNe35FYCugMbE5jX-T-Auz-CLFRBK-PmmeM9qTa/exec";

        // ... [GIỮ NGUYÊN CÁC HÀM KHỞI TẠO, LOGIN, FETCH ĐÃ CÓ] ...

        // Cập nhật hàm staffAction
        async function staffAction(id, action) {
            if (!supabaseClient) return;
            const now = new Date();
            const timeNow = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            if (action === 'confirm') {
                await supabaseClient.from('proposals').update({ status: "Đang xử lý" }).eq('id', id);
            } else if (action === 'complete') {
                // Mở camera thay vì prompt link ảnh
                document.getElementById('active-proposal-id').value = id;
                document.getElementById('camera-input').click();
                return; // Dừng lại chờ người dùng chụp ảnh
            } else if (action === 'incomplete') {
                const r = prompt("Nhập lý do hoãn/chưa xong:");
                if (r && r.trim() !== "") await supabaseClient.from('proposals').update({ status: "Đang xử lý", reason: r.trim() }).eq('id', id);
                else return alert("Phải có lý do báo hoãn!");
            }
            fetchDataFromSupabase();
        }

        // Hàm mới để xử lý ảnh sau khi chụp
        async function handleCapture(e) {
            const file = e.target.files[0];
            const id = document.getElementById('active-proposal-id').value;
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64Data = event.target.result.split(',')[1];
                alert("Đang tải ảnh lên Google Drive, vui lòng đợi...");

                try {
                    // Gửi sang Google Apps Script
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors", // Cần thiết để tránh lỗi CORS
                        body: JSON.stringify({
                            data: base64Data,
                            mimetype: file.type,
                            filename: "Done_" + id + "_" + Date.now() + ".jpg"
                        })
                    });

                    // Lưu ý: Vì mode 'no-cors', chúng ta không đọc được nội dung response trả về trực tiếp.
                    // Bạn cần chỉnh sửa Google Apps Script của bạn để ghi link vào 1 file logs trên Drive 
                    // hoặc giả định link dựa trên ID file nếu muốn lấy link ngay lập tức.
                    // Cách đơn giản nhất: 
                    alert("Ảnh đã được gửi lên hệ thống. Vui lòng kiểm tra Drive.");
                    
                    const now = new Date().toISOString().replace('T', ' ').substring(0, 16);
                    await supabaseClient.from('proposals').update({
                        status: "Hoàn thành",
                        completed_at: now
                    }).eq('id', id);

                    fetchDataFromSupabase();
                } catch (err) {
                    alert("Lỗi khi tải ảnh: " + err.message);
                }
            };
            reader.readAsDataURL(file);
        }

        // ... [GIỮ NGUYÊN CÁC HÀM RENDER, EXPORT, V.V...] ...
    </script>
</body>
</html>
